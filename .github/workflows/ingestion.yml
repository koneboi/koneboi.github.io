name: Scheduled Ingestion

on:
  schedule:
    - cron: "0 3 * * *" # daily at 03:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      DJANGO_EMAIL_BACKEND: ${{ secrets.DJANGO_EMAIL_BACKEND }}
      DJANGO_EMAIL_HOST: ${{ secrets.DJANGO_EMAIL_HOST }}
      DJANGO_EMAIL_PORT: ${{ secrets.DJANGO_EMAIL_PORT }}
      DJANGO_EMAIL_USE_TLS: ${{ secrets.DJANGO_EMAIL_USE_TLS }}
      DJANGO_EMAIL_USER: ${{ secrets.DJANGO_EMAIL_USER }}
      DJANGO_EMAIL_PASSWORD: ${{ secrets.DJANGO_EMAIL_PASSWORD }}
      DJANGO_DEFAULT_FROM_EMAIL: ${{ secrets.DJANGO_DEFAULT_FROM_EMAIL }}
      DJANGO_CONTACT_RECIPIENT_EMAIL: ${{ secrets.DJANGO_CONTACT_RECIPIENT_EMAIL }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      CROSSREF_QUERY: ${{ secrets.CROSSREF_QUERY }}
      NEWS_FEED_URL: ${{ secrets.NEWS_FEED_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Sync publications
        run: python manage.py sync_publications --query "${{ env.CROSSREF_QUERY }}" --rows 25

      - name: Sync news
        run: python manage.py sync_news "${{ env.NEWS_FEED_URL }}" --limit 10

